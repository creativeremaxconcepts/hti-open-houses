<style>
  .open-houses-page {
    max-width: 1400px;
    margin: auto;
    padding: 40px 20px 60px;
    font-family: Arial, Helvetica, sans-serif;
  }
  .open-houses-header { margin-bottom: 30px; }
  .open-house-eyebrow {
    color: #007dc3;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .open-houses-header h1 { margin: 0; font-size: 36px; color: #222; }
  .open-houses-helper { color: #666; margin-top: 6px; font-size: 15px; }
  .openhouses-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 22px;
  }
  .openhouse-card {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    text-decoration: none;
    color: #222;
    box-shadow: 0 10px 30px rgba(0,0,0,.08);
    transition: .2s;
    display: block;
  }
  .openhouse-card:hover { transform: translateY(-4px); }
  .image-wrap { position: relative; }
  .openhouse-card img { width: 100%; height: 210px; object-fit: cover; display: block; }
  .openhouse-ribbon {
    position: absolute; top: 12px; left: 12px; background: #007dc3; color: white;
    font-size: 12px; font-weight: 700; padding: 6px 10px; border-radius: 999px;
  }
  .openhouse-time {
    position: absolute; bottom: 12px; left: 12px; right: 12px; background: white;
    padding: 8px 10px; border-radius: 10px; font-weight: 700; font-size: 13px; box-sizing: border-box;
  }
  .card-body { padding: 18px; }
  .card-body h3 { margin: 0 0 6px; font-size: 20px; }
  .location { font-size: 14px; color: #666; margin-bottom: 10px; }
  .price { color: #007dc3; font-weight: 800; font-size: 22px; margin-bottom: 8px; }
  .details { font-size: 14px; color: #555; margin-bottom: 14px; }
  .view-details {
    background: #f0f8fd; color: #007dc3; padding: 8px 12px; border-radius: 999px;
    font-size: 13px; font-weight: 700; display: inline-block;
  }
  .hti-loading { text-align: center; padding: 60px 20px; color: #999; font-size: 16px; grid-column: 1 / -1; }
  @media (max-width: 1100px) {
    .openhouses-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
  @media (max-width: 700px) {
    .open-houses-header h1 { font-size: 28px; }
    .openhouses-grid { grid-template-columns: 1fr; }
  }
</style>

<section class="open-houses-page">
  <div class="open-houses-header">
    <p class="open-house-eyebrow">Home Team Iowa</p>
    <h1>All of Our Open Houses</h1>
    <p class="open-houses-helper">Browse all current Home Team Iowa open houses.</p>
  </div>
  <div class="openhouses-grid" id="hti-grid">
    <p class="hti-loading">Loading open houses...</p>
  </div>
</section>

<script>
var SHEET_ID = '1WYGNDGK16tJNoQUDIM3ZRFBW3WiNQ4l2Viaz8Q9TkFA';
var TAB_NAME = 'Open Houses';

function parseRows(json) {
  var cols = json.table.cols.map(function(c) { return c.label.trim(); });
  return json.table.rows
    .filter(function(r) { return r && r.c; })
    .map(function(r) {
      var row = {};
      cols.forEach(function(col, i) {
        var cell = r.c[i];
        if (!cell || (cell.v === null || cell.v === undefined)) {
          row[col] = (cell && cell.f) ? cell.f : '';
        } else if (typeof cell.v === 'boolean') {
          row[col] = cell.v ? 'TRUE' : 'FALSE';
        } else if (typeof cell.v === 'string' && cell.v.indexOf('Date(') === 0) {
          row[col] = cell.f || cell.v;
        } else {
          row[col] = String(cell.v).trim();
        }
      });
      return row;
    });
}

function buildCard(row) {
  var parts     = (row['Listing Address'] || '').split(',');
  var street    = parts[0].trim();
  var cityState = parts.slice(1).join(',').trim();
  var link      = row['Listing Link'] || '#';
  var img       = row['Listing Image Link'] || '';
  var num       = parseInt(parseFloat(row['List Price'] || ''));
  var price     = isNaN(num) ? '' : '$' + num.toLocaleString();
  var beds      = row['# Bed'] || '';
  var bathsN    = parseFloat(row['# Bath'] || '');
  var baths     = isNaN(bathsN) ? '' : (bathsN === Math.floor(bathsN) ? String(Math.floor(bathsN)) : String(bathsN));
  var sqft      = row['Square Footage'] || '';
  var d         = (row['Open House Date'] || '').trim();
  var t         = (row['Open House Time'] || '').trim();
  var dl = d.toLowerCase();
  var ribbon    = dl === 'daily' ? 'Daily • ' + t : dl === 'weekly' ? 'Weekly • ' + t : (d ? d + ' • ' + t : t);

  return '<a href="' + link + '" class="openhouse-card">' +
    '<div class="image-wrap">' +
      '<img src="' + img + '" alt="' + street + '" loading="lazy">' +
      '<div class="openhouse-ribbon">Open House</div>' +
      '<div class="openhouse-time">' + ribbon + '</div>' +
    '</div>' +
    '<div class="card-body">' +
      '<h3>' + street + '</h3>' +
      '<p class="location">' + cityState + '</p>' +
      '<p class="price">' + price + '</p>' +
      '<p class="details">' + beds + ' Beds • ' + baths + ' Baths • ' + sqft + ' Sqft</p>' +
      '<span class="view-details">View Details</span>' +
    '</div>' +
  '</a>';
}

function parseOpenHouseDate(str) {
  var parts = str.split('/');
  if (parts.length !== 3) return null;
  var m = parseInt(parts[0], 10) - 1;
  var d = parseInt(parts[1], 10);
  var y = parseInt(parts[2], 10);
  if (y < 100) y += 2000;
  return new Date(y, m, d);
}

function renderPage(json) {
  var grid = document.getElementById('hti-grid');
  if (!grid) return;
  var today = new Date();
  today.setHours(0, 0, 0, 0);
  var rows = parseRows(json);
  var active = rows
    .filter(function(r) {
      if ((r['Active Open House'] || '').toUpperCase() !== 'TRUE') return false;
      var d = (r['Open House Date'] || '').trim().toLowerCase();
      if (!d || d === 'daily' || d === 'weekly') return true;
      var ohDate = parseOpenHouseDate(r['Open House Date'].trim());
      return ohDate !== null && ohDate >= today;
    })
    .sort(function(a, b) {
      return (parseInt(a['Sort Order '] || 999) || 999) - (parseInt(b['Sort Order '] || 999) || 999);
    });
  grid.innerHTML = active.length
    ? active.map(buildCard).join('')
    : '<p class="hti-loading">No open houses currently scheduled.</p>';
}

window.google = window.google || {};
window.google.visualization = window.google.visualization || {};
window.google.visualization.Query = window.google.visualization.Query || {};
window.google.visualization.Query.setResponse = renderPage;

var s = document.createElement('script');
s.src = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(TAB_NAME);
document.head.appendChild(s);
</script>
